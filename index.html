<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAIV.fm</title>
    <meta
      name="description"
      content="WAIV is building the next generation social radio experience."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grain"></div>

    <main class="shell">
      <header class="brand">
        <img src="./assets/logo_waiv_trimmed.png" alt="WAIV logo" class="logo" />
        <p class="domain">waiv.fm</p>
      </header>

      <section class="card">
        <p class="eyebrow">Now Broadcasting Soon</p>
        <h1>The WAIV website is landing soon.</h1>
        <p class="copy">
          The app is in active development. This page is a temporary home while we
          finish the full web experience.
        </p>

        <div class="actions">
          <a href="mailto:hello@waiv.fm" class="button primary">Contact</a>
          <a href="https://instagram.com" class="button secondary" target="_blank" rel="noreferrer">Follow Updates</a>
        </div>
      </section>

      <section class="preview">
        <img src="./assets/on-air.png" alt="Now on air visual" />
      </section>
    </main>
  </body>
</html>
